<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesion - QRFiles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">QRFiles</h1>
      <p class="text-slate-400 mt-1">Sistema de Validacion Documental</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-8">

      <!-- Tabs -->
      <div class="flex gap-2 mb-6 bg-slate-900/60 rounded-xl p-1">
        <button id="tab-login" onclick="showTab('login')"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition bg-blue-600 text-white">
          Iniciar Sesion
        </button>
        <button id="tab-register" onclick="showTab('register')"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition text-slate-400 hover:text-white">
          Registrarse
        </button>
      </div>

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-900/50 border border-red-700 text-red-300 rounded-lg text-sm"></div>
      <div id="success-msg" class="hidden mb-4 p-3 bg-green-900/50 border border-green-700 text-green-300 rounded-lg text-sm"></div>

      <!-- Formulario de Login -->
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Correo electronico</label>
          <input type="email" id="email" required
            placeholder="admin@sistema.com"
            class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Contrasena</label>
          <input type="password" id="password" required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>
        <button type="submit" id="btn-login"
          class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-800
                 disabled:opacity-60 disabled:cursor-not-allowed">
          Iniciar Sesion
        </button>
      </form>

      <!-- Formulario de Registro -->
      <form id="register-form" class="hidden space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Nombre</label>
            <input type="text" id="reg-nombre" required placeholder="Juan"
              class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Apellido(s)</label>
            <input type="text" id="reg-apellidos" required placeholder="Perez Lopez"
              class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Correo electronico</label>
          <input type="email" id="reg-email" required placeholder="tu@correo.com"
            class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Numero de celular</label>
          <input type="tel" id="reg-celular" required maxlength="12" placeholder="1234567890"
            class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          <p class="text-xs text-slate-500 mt-1">Maximo 12 numeros.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Contrasena</label>
          <input type="password" id="reg-password" required placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
          <p class="text-xs text-slate-500 mt-1">Minimo 8 caracteres e incluir al menos un numero.</p>
        </div>
        <button type="submit" id="btn-register"
          class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-800
                 disabled:opacity-60 disabled:cursor-not-allowed">
          Crear Cuenta
        </button>
      </form>

      <div id="demo-users" class="mt-6 pt-5 border-t border-slate-700">
        <p class="text-xs text-slate-500 text-center">Usuarios de prueba:</p>
        <div class="mt-2 space-y-1">
          <p class="text-xs text-slate-400 text-center">Admin: <span class="text-blue-400">admin@sistema.com</span> / <span class="text-blue-400">admin123</span></p>
          <p class="text-xs text-slate-400 text-center">Capturista: <span class="text-blue-400">capturista@sistema.com</span> / <span class="text-blue-400">capturista123</span></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      document.getElementById('demo-users').classList.toggle('hidden', !isLogin);
      document.getElementById('tab-login').classList.toggle('bg-blue-600', isLogin);
      document.getElementById('tab-login').classList.toggle('text-white', isLogin);
      document.getElementById('tab-login').classList.toggle('text-slate-400', !isLogin);
      document.getElementById('tab-register').classList.toggle('bg-blue-600', !isLogin);
      document.getElementById('tab-register').classList.toggle('text-white', !isLogin);
      document.getElementById('tab-register').classList.toggle('text-slate-400', isLogin);
      document.getElementById('error-msg').classList.add('hidden');
      document.getElementById('success-msg').classList.add('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errorDiv = document.getElementById('error-msg');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          errorDiv.textContent = data.error || 'Error al iniciar sesion.';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Iniciar Sesion';
        }
      } catch (err) {
        errorDiv.textContent = 'Error de conexion. Intenta de nuevo.';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesion';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-register');
      const errorDiv = document.getElementById('error-msg');
      const successDiv = document.getElementById('success-msg');

      const nombre = document.getElementById('reg-nombre').value.trim();
      const apellidos = document.getElementById('reg-apellidos').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const celular = document.getElementById('reg-celular').value.trim();
      const password = document.getElementById('reg-password').value;

      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      const celularDigits = celular.replace(/\D/g, '');
      if (celularDigits.length === 0 || celularDigits.length > 12) {
        errorDiv.textContent = 'El numero de celular debe tener maximo 12 numeros.';
        errorDiv.classList.remove('hidden');
        return;
      }
      if (password.length < 8 || !/\d/.test(password)) {
        errorDiv.textContent = 'La contrasena debe tener minimo 8 caracteres e incluir al menos un numero.';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, apellidos, email, celular, password })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          errorDiv.textContent = data.error || 'Error al registrar la cuenta.';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Crear Cuenta';
        }
      } catch (err) {
        errorDiv.textContent = 'Error de conexion. Intenta de nuevo.';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Crear Cuenta';
      }
    });
  </script>
</body>
</html>
