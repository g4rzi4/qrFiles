<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir Documento - QRFiles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script>
    (function () {
      const saved = localStorage.getItem('qrfiles-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#EFEAD8] via-[#F2EEDE] to-[#E3EBE0] dark:from-stone-950 dark:via-stone-900 dark:to-stone-950 text-[#2F3A2D] dark:text-stone-50">

  <!-- Navbar -->
  <nav class="bg-[#FBF8EE] dark:bg-stone-900 border-b border-[#D0C9C0] dark:border-stone-800 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-[#5F7161] dark:bg-orange-500 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <span class="text-lg font-bold text-[#2F3A2D] dark:text-white">QRFiles</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="/dashboard.html" class="text-sm text-[#4C5C4E] dark:text-stone-300 hover:text-[#2F3A2D] dark:hover:text-white transition">Panel</a>
        <a href="/upload.html" class="text-sm text-[#5F7161] dark:text-orange-400 font-medium">Subir Documento</a>
        <a href="/repository.html" class="text-sm text-[#4C5C4E] dark:text-stone-300 hover:text-[#2F3A2D] dark:hover:text-white transition">Repositorio</a>
        <a href="/usuarios.html" id="nav-usuarios" class="hidden text-sm text-[#4C5C4E] dark:text-stone-300 hover:text-[#2F3A2D] dark:hover:text-white transition">Usuarios</a>
        <span class="text-[#D0C9C0] dark:text-stone-700">|</span>
        <button id="theme-toggle" type="button" aria-label="Cambiar tema"
          class="p-2 rounded-lg text-[#5F7161] dark:text-stone-400 hover:bg-[#E3DDC8] dark:hover:bg-stone-800 transition cursor-pointer">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>
          </svg>
          <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <span id="user-name" class="text-sm text-[#5F7161] dark:text-stone-400"></span>
        <button onclick="logout()" class="text-sm text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 transition font-medium">Cerrar Sesion</button>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-10">
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Subir Documento</h1>
      <p class="text-[#5F7161] dark:text-stone-400 mt-1">Registra un PDF y genera su codigo QR de validacion</p>
    </div>

    <!-- Formulario -->
    <div class="bg-[#FBF8EE] dark:bg-stone-900 rounded-2xl border border-[#D0C9C0] dark:border-stone-800 p-8">
      <div id="error-msg" class="hidden mb-5 p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 rounded-lg text-sm"></div>
      <div id="success-box" class="hidden mb-5 p-5 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-xl">
        <p class="font-semibold text-emerald-700 dark:text-emerald-400 mb-2">Documento registrado exitosamente</p>
        <p class="text-sm text-[#4C5C4E] dark:text-stone-300">Folio: <span id="result-folio" class="text-[#2F3A2D] dark:text-white font-mono font-semibold"></span></p>
        <p class="text-sm text-[#4C5C4E] dark:text-stone-300 mt-1">URL de validacion:</p>
        <a id="result-url" href="#" target="_blank" class="text-sm text-[#5F7161] dark:text-orange-400 break-all hover:underline"></a>
        <div class="mt-4 flex gap-3">
          <button onclick="downloadDoc()" class="px-4 py-2 bg-[#5F7161] hover:bg-[#4C5C4E] dark:bg-orange-500 dark:hover:bg-orange-400 text-white rounded-lg text-sm font-medium transition">
            Descargar PDF con QR
          </button>
          <button onclick="resetForm()" class="px-4 py-2 bg-[#E3DDC8] dark:bg-stone-800 hover:bg-[#D6CFB8] dark:hover:bg-stone-700 text-[#2F3A2D] dark:text-stone-100 rounded-lg text-sm font-medium transition">
            Subir otro documento
          </button>
        </div>
      </div>

      <form id="upload-form" class="space-y-6" enctype="multipart/form-data">
        <!-- Archivo PDF -->
        <div>
          <label class="block text-sm font-medium text-[#3F4A3D] dark:text-stone-300 mb-1.5">Archivo PDF <span class="text-red-500 dark:text-red-400">*</span></label>
          <div id="drop-zone"
            class="border-2 border-dashed border-[#D0C9C0] dark:border-stone-700 rounded-xl p-8 text-center cursor-pointer
                   hover:border-[#6D8B74] dark:hover:border-orange-400 hover:bg-[#E3EBE0] dark:hover:bg-orange-900/10 transition">
            <svg class="w-10 h-10 text-[#A39B8C] dark:text-stone-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-[#5F7161] dark:text-stone-400 text-sm">Arrastra tu PDF aqui o <span class="text-[#5F7161] dark:text-orange-400 font-medium">haz clic para seleccionar</span></p>
            <p class="text-[#6D8B74] dark:text-stone-500 text-xs mt-1">Maximo 20 MB</p>
            <input type="file" id="pdf-input" name="pdf" accept=".pdf" class="hidden" required />
          </div>
          <div id="file-info" class="hidden mt-2 flex items-center gap-2 text-sm text-[#3F4A3D] dark:text-stone-300 bg-[#E3DDC8] dark:bg-stone-800 rounded-lg px-4 py-2">
            <svg class="w-4 h-4 text-[#5F7161] dark:text-orange-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span id="file-name" class="truncate"></span>
            <button type="button" onclick="clearFile()" class="ml-auto text-[#A39B8C] dark:text-stone-500 hover:text-red-600 dark:hover:text-red-400 transition">&#10005;</button>
          </div>
        </div>

        <!-- Titulo -->
        <div>
          <label class="block text-sm font-medium text-[#3F4A3D] dark:text-stone-300 mb-1.5">Titulo del documento <span class="text-red-500 dark:text-red-400">*</span></label>
          <input type="text" id="titulo" name="titulo" required maxlength="200"
            placeholder="Ej. Convenio de colaboracion 2024"
            class="w-full px-4 py-2.5 bg-[#F5F1E1] dark:bg-stone-800 border border-[#D0C9C0] dark:border-stone-700 rounded-lg text-[#2F3A2D] dark:text-stone-50 placeholder-[#A39B8C] dark:placeholder-stone-500
                   focus:outline-none focus:ring-2 focus:ring-[#6D8B74] dark:focus:ring-orange-400 focus:border-transparent transition" />
        </div>

        <!-- Tipo de documento -->
        <div>
          <label class="block text-sm font-medium text-[#3F4A3D] dark:text-stone-300 mb-1.5">Tipo de documento <span class="text-red-500 dark:text-red-400">*</span></label>
          <select id="tipo_documento" name="tipo_documento" required
            class="w-full px-4 py-2.5 bg-[#F5F1E1] dark:bg-stone-800 border border-[#D0C9C0] dark:border-stone-700 rounded-lg text-[#2F3A2D] dark:text-stone-50
                   focus:outline-none focus:ring-2 focus:ring-[#6D8B74] dark:focus:ring-orange-400 focus:border-transparent transition">
            <option value="" disabled selected>Selecciona un tipo</option>
            <option value="Contrato">Contrato</option>
            <option value="Convenio">Convenio</option>
            <option value="Acta">Acta</option>
            <option value="Resolucion">Resolucion</option>
            <option value="Oficio">Oficio</option>
            <option value="Certificado">Certificado</option>
            <option value="Dictamen">Dictamen</option>
            <option value="Constancia">Constancia</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <!-- Area emisora -->
        <div>
          <label class="block text-sm font-medium text-[#3F4A3D] dark:text-stone-300 mb-1.5">Area emisora / Responsable <span class="text-red-500 dark:text-red-400">*</span></label>
          <input type="text" id="area_emisora" name="area_emisora" required maxlength="150"
            placeholder="Ej. Direccion de Recursos Humanos"
            class="w-full px-4 py-2.5 bg-[#F5F1E1] dark:bg-stone-800 border border-[#D0C9C0] dark:border-stone-700 rounded-lg text-[#2F3A2D] dark:text-stone-50 placeholder-[#A39B8C] dark:placeholder-stone-500
                   focus:outline-none focus:ring-2 focus:ring-[#6D8B74] dark:focus:ring-orange-400 focus:border-transparent transition" />
        </div>

        <!-- Posicion del QR -->
        <div>
          <label class="block text-sm font-medium text-[#3F4A3D] dark:text-stone-300 mb-3">Posicion del codigo QR en el PDF</label>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <label class="relative cursor-pointer">
              <input type="radio" name="qr_position" value="superior_izquierda" class="sr-only peer" />
              <div class="p-3 bg-[#F5F1E1] dark:bg-stone-800 border-2 border-[#D0C9C0] dark:border-stone-700 rounded-xl text-center text-sm text-[#4C5C4E] dark:text-stone-300
                          peer-checked:border-[#5F7161] dark:peer-checked:border-orange-400 peer-checked:bg-[#E3EBE0] dark:peer-checked:bg-orange-900/30 peer-checked:text-[#3F4A3D] dark:peer-checked:text-orange-300 transition hover:border-[#A39B8C] dark:hover:border-stone-500">
                <div class="text-lg mb-1">↖</div>Superior izquierda
              </div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="qr_position" value="superior_derecha" class="sr-only peer" />
              <div class="p-3 bg-[#F5F1E1] dark:bg-stone-800 border-2 border-[#D0C9C0] dark:border-stone-700 rounded-xl text-center text-sm text-[#4C5C4E] dark:text-stone-300
                          peer-checked:border-[#5F7161] dark:peer-checked:border-orange-400 peer-checked:bg-[#E3EBE0] dark:peer-checked:bg-orange-900/30 peer-checked:text-[#3F4A3D] dark:peer-checked:text-orange-300 transition hover:border-[#A39B8C] dark:hover:border-stone-500">
                <div class="text-lg mb-1">↗</div>Superior derecha
              </div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="qr_position" value="inferior_izquierda" class="sr-only peer" />
              <div class="p-3 bg-[#F5F1E1] dark:bg-stone-800 border-2 border-[#D0C9C0] dark:border-stone-700 rounded-xl text-center text-sm text-[#4C5C4E] dark:text-stone-300
                          peer-checked:border-[#5F7161] dark:peer-checked:border-orange-400 peer-checked:bg-[#E3EBE0] dark:peer-checked:bg-orange-900/30 peer-checked:text-[#3F4A3D] dark:peer-checked:text-orange-300 transition hover:border-[#A39B8C] dark:hover:border-stone-500">
                <div class="text-lg mb-1">↙</div>Inferior izquierda
              </div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="qr_position" value="inferior_derecha" class="sr-only peer" checked />
              <div class="p-3 bg-[#E3EBE0] dark:bg-orange-900/30 border-2 border-[#5F7161] dark:border-orange-400 rounded-xl text-center text-sm text-[#3F4A3D] dark:text-orange-300
                          peer-checked:border-[#5F7161] dark:peer-checked:border-orange-400 peer-checked:bg-[#E3EBE0] dark:peer-checked:bg-orange-900/30 peer-checked:text-[#3F4A3D] dark:peer-checked:text-orange-300 transition hover:border-[#A39B8C] dark:hover:border-stone-500">
                <div class="text-lg mb-1">↘</div>Inferior derecha
              </div>
            </label>
            <label class="relative cursor-pointer sm:col-span-2">
              <input type="radio" name="qr_position" value="ultima_inferior_derecha" class="sr-only peer" />
              <div class="p-3 bg-[#F5F1E1] dark:bg-stone-800 border-2 border-[#D0C9C0] dark:border-stone-700 rounded-xl text-center text-sm text-[#4C5C4E] dark:text-stone-300
                          peer-checked:border-[#5F7161] dark:peer-checked:border-orange-400 peer-checked:bg-[#E3EBE0] dark:peer-checked:bg-orange-900/30 peer-checked:text-[#3F4A3D] dark:peer-checked:text-orange-300 transition hover:border-[#A39B8C] dark:hover:border-stone-500">
                <div class="text-lg mb-1">📄↘</div>Ultima pagina inf. derecha
              </div>
            </label>
          </div>
        </div>

        <button type="submit" id="btn-submit"
          class="w-full py-3 bg-[#5F7161] hover:bg-[#4C5C4E] dark:bg-orange-500 dark:hover:bg-orange-400 text-white font-semibold rounded-xl transition
                 focus:outline-none focus:ring-2 focus:ring-[#6D8B74] dark:focus:ring-orange-400 focus:ring-offset-2 focus:ring-offset-[#FBF8EE] dark:focus:ring-offset-stone-900
                 disabled:opacity-60 disabled:cursor-not-allowed">
          Generar QR y Registrar Documento
        </button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('qrfiles-theme', isDark ? 'dark' : 'light');
    });

    let lastDocId = null;

    async function checkAuth() {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location.href = '/login.html'; return; }
      const data = await res.json();
      document.getElementById('user-name').textContent = data.nombre;
      if (data.rol === 'admin') {
        document.getElementById('nav-usuarios').classList.remove('hidden');
      }
    }

    const dropZone = document.getElementById('drop-zone');
    const pdfInput = document.getElementById('pdf-input');

    dropZone.addEventListener('click', () => pdfInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-[#6D8B74]', 'dark:border-orange-400'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-[#6D8B74]', 'dark:border-orange-400'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('border-[#6D8B74]', 'dark:border-orange-400');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        const dt = new DataTransfer();
        dt.items.add(file);
        pdfInput.files = dt.files;
        showFile(file.name);
      }
    });

    pdfInput.addEventListener('change', () => {
      if (pdfInput.files[0]) showFile(pdfInput.files[0].name);
    });

    function showFile(name) {
      document.getElementById('file-name').textContent = name;
      document.getElementById('file-info').classList.remove('hidden');
      dropZone.classList.add('hidden');
    }

    function clearFile() {
      pdfInput.value = '';
      document.getElementById('file-info').classList.add('hidden');
      dropZone.classList.remove('hidden');
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errorDiv = document.getElementById('error-msg');

      errorDiv.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Procesando...';

      const formData = new FormData(e.target);

      try {
        const res = await fetch('/api/documents', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
          lastDocId = data.documento.id;
          document.getElementById('result-folio').textContent = data.documento.folio;
          const url = data.documento.validacion_url;
          const urlEl = document.getElementById('result-url');
          urlEl.textContent = url;
          urlEl.href = url;
          document.getElementById('upload-form').classList.add('hidden');
          document.getElementById('success-box').classList.remove('hidden');
        } else {
          errorDiv.textContent = data.error || 'Error al procesar el documento.';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Error de conexion.';
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generar QR y Registrar Documento';
      }
    });

    function downloadDoc() {
      if (lastDocId) window.open(`/api/documents/${lastDocId}/download`, '_blank');
    }

    function resetForm() {
      lastDocId = null;
      document.getElementById('upload-form').reset();
      document.getElementById('upload-form').classList.remove('hidden');
      document.getElementById('success-box').classList.add('hidden');
      document.getElementById('file-info').classList.add('hidden');
      dropZone.classList.remove('hidden');
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }

    checkAuth();
  </script>
</body>
</html>
